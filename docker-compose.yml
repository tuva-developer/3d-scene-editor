services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scene-editor-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    ports:
      - "${DOCKER_BACKEND_PORT:-4001}:4000"
    volumes:
      - scene_editor_uploads:/app/uploads

volumes:
  scene_editor_uploads:
